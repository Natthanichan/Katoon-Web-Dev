<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <!-- Linking Font Awesome for icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="DetailPageStyle.css">
    <link rel="stylesheet" href="navbar.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    // โหลด library lottie
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const searchanim = document.getElementById("searchAnim");
        const loginanim = document.getElementById("loginAnim");

        searchAnim.addEventListener("click", () => {
            searchAnim.stop();
            searchAnim.play();
        });

        loginAnim.addEventListener("click", () => {
            loginAnim.stop();
            loginAnim.play();
        });
    });
    </script>
</head>

<body>
    <header>
        <div class="navbar">
            <a href="#" class="nav-logo">
                <span class="logo-text">KATOON</span>
            </a>
            <ul class="nav-menu">
                <li>
                    <a class="nav-item" href="#" id="ORIGINAL">ORIGINAL</a>
                </li>
                <li >
                    <a class="nav-item active" href="#" id="TEAM">TEAM</a>
                </li>
                <li class="search-item">
                        <a href="#" class="search">
                        <!-- ตัวเล่น animation สำหรับไฟล์ Lottie -->
                        <lottie-player 
                            id="searchAnim"
                            src="/image/navbarIcon/search.json"
                            background="transparent"
                            speed="1"
                            style="width:30px; height: 30px;"
                        ></lottie-player>
                    </a>
                </li>
                <li class="login-item">
                    <a href="#" class="login">
                        <!-- ตัวเล่น animation สำหรับไฟล์ Lottie -->
                        <lottie-player 
                            id="loginAnim"
                            src="/image/navbarIcon/login.json"
                            background="transparent"
                            speed="1"
                            style="width:35px; height: 35px;"
                        ></lottie-player>
                    </a>
                </li>
            </ul>
        </div>
    </header>
</body>
</html>
