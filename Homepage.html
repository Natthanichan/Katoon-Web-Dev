<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="homepageStyle.css">
    <link rel="stylesheet" href="footer.css">

    <script src="script.js" defer></script>
    <script src="homepage.js" defer></script>
</head>

<body>
<header>
    <div class="navbar">
        <ul class="nav-menu">
            <li>
                <a href="#" class="nav-logo">
                    <span class="logo-text">KATOON</span>
                </a>
            </li>
            <li><a class="nav-item active" href="#" id="ORIGINAL">ORIGINAL</a></li>
            <li><a class="nav-item" href="Team.html" id="TEAM">TEAM</a></li>

            <li class="search-item">
                <a href="SearchPage.html" class="search">
                    <lottie-player
                        id="searchAnim"
                        src="/image/navbarIcon/search.json"
                        background="transparent"
                        speed="1"
                        style="width:30px; height: 30px;">
                    </lottie-player>
                </a>
            </li>

            <li class="login-item">
                <a href="javascript:void(0)" class="login" onclick="openModal()">
                    <lottie-player
                        id="loginAnim"
                        src="/image/navbarIcon/login.json"
                        background="transparent"
                        speed="1"
                        style="width:35px; height: 35px;">
                    </lottie-player>
                </a>
            </li>
        </ul>
    </div>
</header>

<main class="container" style="margin-top: 130px;">

    <div class="carousel mb-5">
        <div id="carousel1" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner" style="border-radius: 15px; overflow: hidden;">
                <div class="carousel-item active">
                    <img src="image/covers/night_owls.jpg" class="d-block w-100" alt="GL Banner">
                </div>
                <div class="carousel-item">
                    <img src="image/covers/sweet_home.jpg" class="d-block w-100" alt="Romance Banner">
                </div>
                <div class="carousel-item">
                    <img src="image/ปกแนะนำ.JPG" class="d-block w-100" alt="Horror Banner">
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carousel1" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carousel1" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </div>

    <div class="quote-section mb-5">
        <h2 class="quote-title mb-3">Quote of the day!</h2>
        <div class="quote-box mb-5">
            <p id="quoteText">"Loading your daily inspiration..."</p>
            <small id="quoteAuthor">- KATOON Team</small>
        </div>
    </div>

    <div class="daily-section mb-5">
        <h2 class="daily-title mb-3">DAILY</h2>

        <div class="day-filters mb-4">
            <span class="day-pill active" data-day="Monday">MON</span>
            <span class="day-pill" data-day="Tuesday">TUE</span>
            <span class="day-pill" data-day="Wednesday">WED</span>
            <span class="day-pill" data-day="Thursday">THU</span>
            <span class="day-pill" data-day="Friday">FRI</span>
            <span class="day-pill" data-day="Saturday">SAT</span>
            <span class="day-pill" data-day="Sunday">SUN</span>
        </div>

        <div class="row row-cols-2 row-cols-md-5 g-4 custom-grid" id="homeGrid"></div>
    </div>

</main>

<!-- Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>

        <h2 class="modal-title">Log in KATOON!</h2>

        <div class="login-field">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>

        <div class="login-field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="btn-login btn-user" id="userLoginBtn">User Login</button>
        <button class="btn-login btn-admin" id="adminLoginBtn">Admin Account</button>
    </div>
</div>

<footer class="katoon-footer">
    <div class="container-footer">
        <img id="foot-img" src="image/QR code.png" alt="QR Code">
        <div class="footer-links">
            <a href="#">ABOUT</a> | <a href="#">FEEDBACK</a> | <a href="#">HELP</a> | <a href="#">TERMS</a><br>
            <a href="#">PRIVACY</a> | <a href="#">ADVERTISE</a> | <a href="#">CONTACT</a>
        </div>
        <h2 class="footer-logo">KATOON</h2>
    </div>
</footer>

</body>
</html>
