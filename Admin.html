<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="AdminStyle.css">
    <link rel="stylesheet" href="footer.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="script.js"></script>
</head>

<body>

<header>
    <div class="navbar">
        <ul class="nav-menu">
            <li>
                <a href="Homepage.html" class="nav-logo">
                    <span class="logo-text">KATOON</span>
                </a>
            </li>

            <li>
                <a class="nav-item active" href="#">ADMIN DASHBOARD</a>
            </li>

            <li class="out-item">
                <a href="#">
                    <lottie-player
                        src="/image/navbarIcon/out.json"
                        background="transparent"
                        speed="1"
                        style="width:30px; height:30px;">
                    </lottie-player>
                </a>
            </li>
        </ul>
    </div>
</header>


<!-- MAIN CONTENT -->
<div class="container">

    <div class="grid">

        <!-- ADD CARD -->
        <div class="add-card" id="addBtn">
            <a href="#">
                <lottie-player
                    src="/image/navbarIcon/add.json"
                    background="transparent"
                    speed="1"
                    style="width:35px; height:35px;">
                </lottie-player>
            </a>
        </div>

        <!-- ตัวอย่าง card -->
        <!--
        <div class="card">
            <img src="image/test.jpg">
            <p class="genre">Romance</p>
            <p>Your Letter</p>
        </div>
        -->

    </div>

</div>


<!-- POPUP -->
<div id="popup">
    <div class="popup-box">

        <span id="closeBtn">←</span>

        <div class="popup-content">

            <div class="form">

                <div class="form-group">
                    <label>Cover Picture</label>
                    <input type="file">
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Author name</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Weekly Date</label>
                    <select>
                        <option>Monday</option>
                        <option>Tuesday</option>
                        <option>Wednesday</option>
                        <option>Thursday</option>
                        <option>Friday</option>
                        <option>Saturday</option>
                        <option>Sunday</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Genre</label>
                    <select>
                        <option>Romance</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>View</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea></textarea>
                </div>

                <div class="button-group">
                    <button>Delete</button>
                    <button>Update</button>
                    <button>Save</button>
                </div>

            </div>
        </div>
    </div>
</div>

  <footer class="katoon-footer">
      <div class="container-footer">
          <img id="foot-img" src="image/QR code.png" alt="QR Code">
          
          <div class="footer-links">
              <a href="#">ABOUT</a> | <a href="#">FEEDBACK</a> | <a href="#">HELP</a> | <a href="#">TERMS</a><br>
              <a href="#">PRIVACY</a> | <a href="#">ADVERTISE</a> | <a href="#">CONTACT</a>
          </div>
          
          <h2 class="footer-logo">KATOON</h2>
      </div>
  </footer>

</body>
</html>
