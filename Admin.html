<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="AdminStyle.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="script.js"></script>
</head>

<body>
<header>
    <div class="navbar">
        <ul class="nav-menu">
            <li>
                <a href="Homepage.html" class="nav-logo">
                    <span class="logo-text">KATOON</span>
                </a>
            </li>
            <li>
                <a class="nav-item active" href="#" id="AdminDashboard">ADMIN DASHBOARD</a>
            </li>
            <li class="out-item">
                <a href="Homepage.html" class="out">
                    <lottie-player 
                        id="outAnim"
                        src="/image/navbarIcon/out.json"
                        background="transparent"
                        speed="1"
                        style="width:30px; height: 30px;">
                    </lottie-player>
                </a>
            </li>
        </ul>
    </div>
</header>

<div class="container">
    <div class="grid" id="adminGrid">
        <div class="add-card" id="addBtn">
            <a href="#" class="login">
                <lottie-player 
                    id="addAnim"
                    src="/image/navbarIcon/add.json"
                    background="transparent"
                    speed="1"
                    style="width:35px; height: 35px;">
                </lottie-player>
            </a>
        </div>
    </div>
</div>

<div id="popup">
    <div class="popup-box">
        <span id="closeBtn">←</span>

        <div class="popup-content">
            <div class="form">
                <div class="form-group">
                    <label>Cover Picture</label>
                    <input type="file" id="coverInput">
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="titleInput">
                </div>

                <div class="form-group">
                    <label>Author name</label>
                    <input type="text" id="authorInput">
                </div>

                <div class="form-group">
                    <label>Weekly Date</label>
                    <select id="dateInput">
                        <option>Monday</option>
                        <option>Tuesday</option>
                        <option>Wednesday</option>
                        <option>Thursday</option>
                        <option>Friday</option>
                        <option>Saturday</option>
                        <option>Sunday</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Genre</label>
                    <select id="genreInput">
                        <option>Romance</option>
                        <option>Fantasy</option>
                        <option>Drama</option>
                        <option>Horror</option>
                        <option>Action</option>
                        <option>Comedy</option>
                        <option>Slice of Life</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>View</label>
                    <input type="text" id="viewInput">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="descriptionInput"></textarea>
                </div>

                <div class="button-group">
                    <button id="deleteBtn">Delete</button>
                    <button id="updateBtn">Update</button>
                    <button id="saveBtn">Save</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="katoon-footer">
    <div class="container-footer">
        <img id="foot-img" src="image/QR code.png" alt="QR Code">

        <div class="footer-links">
            <a href="#">ABOUT</a> | <a href="#">FEEDBACK</a> | <a href="#">HELP</a> | <a href="#">TERMS</a><br>
            <a href="#">PRIVACY</a> | <a href="#">ADVERTISE</a> | <a href="#">CONTACT</a>
        </div>

        <h2 class="footer-logo">KATOON</h2>
    </div>
</footer>

<script src="admin.js"></script>
</body>
</html>
