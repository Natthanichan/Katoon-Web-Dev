<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATOON | Search Results</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <link rel="stylesheet" href="ResultStyle.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
</head>

<body>
  <header>
      <div class="navbar">
          <ul class="nav-menu">
              <li>
                <a href="Homepage.html" class="nav-logo">
                    <span class="logo-text">KATOON</span>
                </a>
              </li>
              <li>
                  <a class="nav-item" href="Homepage.html" id="ORIGINAL">ORIGINAL</a>
              </li>
              <li>
                  <a class="nav-item" href="Team.html" id="TEAM">TEAM</a>
              </li>
              <li class="search-item">
                  <a href="SearchPage.html" class="search">
                      <lottie-player
                          id="searchAnim"
                          src="/image/navbarIcon/search.json"
                          background="transparent"
                          speed="1"
                          style="width:30px; height: 30px;">
                      </lottie-player>
                  </a>
              </li>
              <li class="login-item">
                  <a href="#" class="login">
                      <lottie-player
                          id="loginAnim"
                          src="/image/navbarIcon/login.json"
                          background="transparent"
                          speed="1"
                          style="width:35px; height: 35px;">
                      </lottie-player>
                  </a>
              </li>
          </ul>
      </div>
  </header>

  <main class="container result-main-wrapper">
      
      <section class="search-summary-bar">
          <div class="summary-box">
              Showing the result of: <span class="search-term">Romance</span>
          </div>
          <div class="pill-display">Search by: All</div>
          <div class="pill-display">Filter by: None</div>
      </section>
      
      <div class="mt-3 d-flex gap-2">
         <input type="text" id="resultSearchInput" class="form-control" placeholder="Search again...">
         <button id="resultSearchBtn" class="btn btn-dark">🔍</button>
      </div> 

      <section class="grid-header mt-4">
          <div class="d-flex justify-content-between align-items-end">
              <div>
                  <span class="all-label">ALL</span>
                  <span class="series-count">999 series</span>
              </div>
              <a href="#" class="view-all-link">View all ></a>
          </div>
      </section>

      <section class="results-grid-section mt-3">
          <div class="row row-cols-2 row-cols-md-5 g-4" id="resultGrid">
              
              <div class="col">
                  <article class="katoon-card">
                      <div class="img-container">
                          <div class="img-placeholder"></div> 
                      </div>
                      <div class="card-info">
                          <h3 class="comic-title">One Husband Is Enough</h3>
                          <p class="comic-author">Go Sunyoung</p>
                          <p class="comic-stats">50M Views</p>
                      </div>
                  </article>
              </div>

              </div>
      </section>
  </main>
    <footer class="katoon-footer">
        <div class="container-footer">
            <img id="foot-img" src="image/QR code.png" alt="QR Code">
            <div class="footer-links">
                <a href="#">ABOUT</a> | <a href="#">FEEDBACK</a> | <a href="#">HELP</a> | <a href="#">TERMS</a><br>
                <a href="#">PRIVACY</a> | <a href="#">ADVERTISE</a> | <a href="#">CONTACT</a>
            </div>
            <h2 class="footer-logo">KATOON</h2>
        </div>
    </footer>
  <script src="result.js"></script>

</body>
</html>
